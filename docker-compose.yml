version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: routeopt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/routeopt
      PORT: 3000
      NODE_ENV: production
      OR_TOOLS_TIME_LIMIT_MS: 5000
      ORS_API_KEY: ${ORS_API_KEY}
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
